# ─────────────────────────────────────────────────────────────────────────────
#  PluginPulse Companion
#  Keep your other plugins up to date without touching their code.
#
#  For each plugin you want managed, add an entry under "plugins:" below. The key
#  must be the plugin's EXACT name as shown in /plugins. Give it ONE update source
#  (modrinth, github, hangar, or jenkins) and a mode.
#
#  After editing, run:  /pluginpulse reload
# ─────────────────────────────────────────────────────────────────────────────

plugins:
  # ---- Examples (remove the '#' and adapt, or delete these) ----
  #
  # SomePlugin:
  #   modrinth: some-project-slug   # the slug from its Modrinth URL
  #   mode: notify                  # tell admins, don't download
  #
  # AnotherPlugin:
  #   github: owner/repo            # its GitHub repository (uses Releases)
  #   mode: download                # download + stage; applies on next restart
  #   track: mc26                   # OPTIONAL: follow a "-mc26" release line
  #
  # PrivatePlugin:
  #   github: owner/private-repo    # a PRIVATE repo needs a token to read/download
  #   github-token: "${GITHUB_TOKEN}"  # env-var reference (recommended), OR a literal
  #                                    # PAT. Needs read-only Contents scope on the repo.
  #   mode: auto-stage              # private gifts can't use the notify link — auto-stage
  #
  # HangarPlugin:
  #   hangar: project-slug          # its Hangar project slug
  #   mode: check-only              # silent: only /pluginpulse shows the result
  #
  # FastAsyncWorldEdit:             # a plugin that publishes CI snapshots on Jenkins
  #   jenkins: https://ci.athion.net/job/FastAsyncWorldEdit/   # the JOB page URL
  #   jenkins-artifact: "Paper"     # picks the right jar when a build ships several
  #                                 # (regex, matched anywhere in the file name)
  #   mode: notify
  #   require-hash: false           # Jenkins publishes no checksums; without this,
  #                                 # download/auto modes refuse the file

# What "mode" means:
#   off          — ignore this plugin
#   check-only   — check silently; results shown only via /pluginpulse
#   notify       — check + tell admins on join and in console; the notice has a
#                  button to download + install in the background, no page visit
#   download     — check + download + stage; the update applies on next restart
#   auto-stage   — like download, but staged automatically as soon as it's found

# Optional per-plugin keys:
#   github-token — for a PRIVATE github repo. A ${ENV_VAR} reference (recommended)
#                  or a literal PAT with read-only Contents scope on that repo.
#   hot-reload   — true to install without a restart. Auto-refuses at runtime when
#                  unsafe (Folia, other plugins depend on it, or it bundles a
#                  native library such as the SQLite driver) and falls back to a
#                  restart-install. Default false.

# Contact string sent with API requests. Modrinth's API rules require a way to
# reach you (an email or a project/website URL).
user-agent-contact: "you@example.com"

# How often to check each plugin, in hours (minimum 1).
check-interval-hours: 6
